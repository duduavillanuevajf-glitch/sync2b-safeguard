server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver DNS interno do Docker — força resolução em runtime,
    # evitando que nginx cache falhas de DNS quando a api ainda está subindo.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        # Variável obriga nginx a resolver o hostname a cada request
        set $backend http://api:3000;
        proxy_pass $backend;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Não propagar o header de erro do upstream para o cliente
        proxy_intercept_errors off;
    }

    # SPA fallback — todas as rotas React vão para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome (Vite os gera com hash)
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
